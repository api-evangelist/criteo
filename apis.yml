apis:
  - aid: criteo:criteo-retail-media-api
    name: Criteo Retail Media API
    description: >-
      The Criteo Retail Media API is a REST API that lets retailers, brands,
      and agencies build retail media campaigns programmatically. It exposes
      operations for creating and updating campaigns and line items,
      managing audiences and audience algebra nodes, configuring partner
      and retailer accounts, browsing the retailer product catalog, and
      retrieving demand-side and supply-side analytics including balances
      and billing reports. Authentication uses OAuth 2.0 client
      credentials, authorization code, or authorization code with PKCE.
    humanURL: https://developers.criteo.com/retail-media/docs/welcome-to-criteo
    properties:
      - type: Documentation
        url: https://developers.criteo.com/retail-media/docs/welcome-to-criteo
      - type: Reference
        url: https://developers.criteo.com/retail-media/reference
      - type: ChangeLog
        url: https://developers.criteo.com/retail-media/changelog
      - type: Authentication
        url: https://developers.criteo.com/retail-media/docs/api-authorization
    tags:
      - Audiences
      - Campaigns
      - Catalog
      - Line Items
      - Reporting
      - Retail Media
  - aid: criteo:criteo-marketing-solutions-api
    name: Criteo Marketing Solutions API
    description: >-
      The Criteo Marketing Solutions API provides programmatic access to
      Criteo's commerce media platform for advertisers and agencies running
      acquisition and retention campaigns. It covers advertiser accounts,
      campaigns and budgets, audience targeting, creative management,
      analytics, and Criteo's Commerce Growth and Commerce Max products.
    humanURL: https://developers.criteo.com/marketing-solutions/docs/welcome
    properties:
      - type: Documentation
        url: https://developers.criteo.com/marketing-solutions/docs/welcome
      - type: Reference
        url: https://developers.criteo.com/marketing-solutions/reference
      - type: ChangeLog
        url: https://developers.criteo.com/marketing-solutions/changelog
    tags:
      - Advertising
