aid: criteo
name: Criteo
x-type: company
description: >-
  Criteo is a global commerce media company best known for its Retail Media
  platform, enabling retailers, brands, agencies, and partners to create,
  launch, and measure on-site and off-site retail media campaigns. The
  Criteo Retail Media API surface provides programmatic access to campaign
  management, audience segmentation, line item bidding and budgeting,
  retailer catalogs, balances and billing, and demand-side and supply-side
  reporting. Criteo's APIs use OAuth 2.0 with client credentials,
  authorization code, and PKCE flows and ship with a published Swagger
  specification and Postman collection.
